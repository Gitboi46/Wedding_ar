<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wedding AR Experience</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #landing {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 20;
    }

    #thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #startButton {
      position: absolute;
      bottom: 40px;
      padding: 20px 35px;
      font-size: 18px;
      background: #ffffff;
      color: #000;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }

    /* IMPORTANT FIX */
    a-scene {
      visibility: hidden; /* NOT display:none */
    }
  </style>
</head>

<body>

<div id="landing">
  <img 
    id="thumbnail"
    src="https://raw.githubusercontent.com/Gitboi46/Wedding_ar/main/Web%20Home%20Page.png"
  >
  <button id="startButton">Start AR Experience 💍</button>
</div>

<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: ./combinedTargets.mind; autoStart: false;"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets>

    <video
      id="video1"
      src="./marrage video bite 01.mp4"
      preload="auto"
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>

    <video
      id="video2"
      src="./marrage video bite 02.mp4"
      preload="auto"
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>

  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- TARGET 1 -->
  <a-entity mindar-image-target="targetIndex: 0" id="target1">
    <a-plane
      id="plane1"
      visible="false"
      width="1"
      height="0.6"
      material="shader: flat; src: #video1"
    ></a-plane>
  </a-entity>

  <!-- TARGET 2 -->
  <a-entity mindar-image-target="targetIndex: 1" id="target2">
    <a-plane
      id="plane2"
      visible="false"
      width="1"
      height="0.6"
      material="shader: flat; src: #video2"
    ></a-plane>
  </a-entity>

</a-scene>

<script>
const startButton = document.getElementById("startButton");
const landing = document.getElementById("landing");
const scene = document.querySelector("#arScene");

const video1 = document.querySelector("#video1");
const video2 = document.querySelector("#video2");

const target1 = document.querySelector("#target1");
const target2 = document.querySelector("#target2");

const plane1 = document.querySelector("#plane1");
const plane2 = document.querySelector("#plane2");

async function startAR() {
  await scene.systems["mindar-image-system"].start();
}

startButton.addEventListener("click", async () => {

  landing.style.display = "none";

  // FIX: use visibility instead of display
  scene.style.visibility = "visible";

  if (scene.hasLoaded) {
    await startAR();
  } else {
    scene.addEventListener("loaded", startAR, { once: true });
  }
});

target1.addEventListener("targetFound", async () => {
  video2.pause();
  plane1.setAttribute("visible", false);

  await video1.play();

  if (video1.readyState >= 2) {
    plane1.setAttribute("visible", true);
  }
});

target1.addEventListener("targetLost", () => {
  video1.pause();
  plane1.setAttribute("visible", false);
});

target2.addEventListener("targetFound", async () => {
  video1.pause();
  plane2.setAttribute("visible", false);

  await video2.play();

  if (video2.readyState >= 2) {
    plane2.setAttribute("visible", true);
  }
});

target2.addEventListener("targetLost", () => {
  video2.pause();
  plane2.setAttribute("visible", false);
});
</script>

</body>
</html>
