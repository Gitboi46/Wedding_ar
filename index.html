<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wedding AR Experience</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #landing {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 20;
    }

    #thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #startButton {
      position: absolute;
      bottom: 60px;
      padding: 20px 35px;
      font-size: 18px;
      background: #ffffff;
      color: #000;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }

    #soundButton {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 18px;
      font-size: 14px;
      background: rgba(255,255,255,0.9);
      color: #000;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      z-index: 30;
      display: none;
    }

    a-scene {
      display: none;
    }
  </style>
</head>

<body>

<div id="landing">
  <img 
    id="thumbnail"
    src="https://raw.githubusercontent.com/Gitboi46/Wedding_ar/main/Web%20Home%20Page.png"
  >
  <button id="startButton">Start AR Experience 💍</button>
</div>

<button id="soundButton">Enable Sound 🔊</button>

<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: https://raw.githubusercontent.com/Gitboi46/Wedding_ar/main/targetsboth.mind; autoStart: false;"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets>

    <!-- VIDEO 1 -->
    <video
      id="video1"
      src="https://raw.githubusercontent.com/Gitboi46/Wedding_ar/main/marrage%20video%20bite%2001.mp4"
      preload="auto"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>

    <!-- VIDEO 2 -->
    <video
      id="video2"
      src="https://raw.githubusercontent.com/Gitboi46/Wedding_ar/main/marrage%20video%20bite%2002.mp4"
      preload="auto"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>

  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- TARGET 1 -->
  <a-entity mindar-image-target="targetIndex: 0" id="target1">
    <a-plane width="1" height="0.6"
      material="shader: flat; src: #video1">
    </a-plane>
  </a-entity>

  <!-- TARGET 2 -->
  <a-entity mindar-image-target="targetIndex: 1" id="target2">
    <a-plane width="1" height="0.6"
      material="shader: flat; src: #video2">
    </a-plane>
  </a-entity>

</a-scene>

<script>
const startButton = document.getElementById("startButton");
const soundButton = document.getElementById("soundButton");
const landing = document.getElementById("landing");
const scene = document.querySelector("#arScene");

const video1 = document.querySelector("#video1");
const video2 = document.querySelector("#video2");

const target1 = document.querySelector("#target1");
const target2 = document.querySelector("#target2");

async function startAR() {
  await scene.systems["mindar-image-system"].start();
}

startButton.addEventListener("click", async () => {

  landing.style.display = "none";
  scene.style.display = "block";
  soundButton.style.display = "block";

  if (scene.hasLoaded) {
    await startAR();
  } else {
    scene.addEventListener("loaded", startAR, { once: true });
  }
});

// Enable Sound Button
soundButton.addEventListener("click", () => {

  video1.muted = false;
  video2.muted = false;

  soundButton.innerText = "Sound On 🔊";
  soundButton.disabled = true;
});

// Target Events
target1.addEventListener("targetFound", () => {
  video2.pause();
  video1.play();
});

target1.addEventListener("targetLost", () => {
  video1.pause();
});

target2.addEventListener("targetFound", () => {
  video1.pause();
  video2.play();
});

target2.addEventListener("targetLost", () => {
  video2.pause();
});
</script>

</body>
</html>
