<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wedding AR Experience</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    #landing {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 20;
    }

    #thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #startButton {
      position: absolute;
      bottom: 40px;
      padding: 20px 35px;
      font-size: 18px;
      background: #ffffff;
      color: #000;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    #startButton:hover {
      background: #83a759;
      color: white;
    }

    a-scene {
      display: none;
    }
  </style>
</head>

<body>

<div id="landing">
  <img 
    id="thumbnail"
    src="https://raw.githubusercontent.com/Gitboi46/Wedding_ar/main/Web%20Home%20Page.png"
    alt="Wedding AR Thumbnail"
  >
  <button id="startButton">Start AR Experience 💍</button>
</div>

<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: https://raw.githubusercontent.com/Gitboi46/Wedding_ar/main/target%201.mind; autoStart: false;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets>
    <video
      id="weddingVideo"
      src="https://raw.githubusercontent.com/Gitboi46/Wedding_ar/main/marrage%20video%20bite%2001.mp4"
      preload="auto"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0" id="target">
    <a-plane
      position="0 0 0.01"
      width="1"
      height="1"
      material="shader: flat; src: #weddingVideo"
    ></a-plane>
  </a-entity>

</a-scene>

<script>
const startButton = document.getElementById("startButton");
const landing = document.getElementById("landing");
const scene = document.querySelector("#arScene");
const video = document.querySelector("#weddingVideo");
const target = document.querySelector("#target");

startButton.addEventListener("click", async () => {
  try {

    landing.style.display = "none";
    scene.style.display = "block";

    const mindarSystem = scene.systems["mindar-image-system"];

    // Start camera FIRST (important for Android)
    await mindarSystem.start();

    // Unlock video for iOS AFTER camera starts
    await video.play();
    video.pause();

  } catch (err) {
    alert("Camera permission denied or not supported.");
    console.error(err);
  }
});

target.addEventListener("targetFound", () => {
  video.play();
});

target.addEventListener("targetLost", () => {
  video.pause();
});
</script>

</body>
</html>
